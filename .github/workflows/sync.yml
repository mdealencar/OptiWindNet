name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day
  workflow_dispatch: # Keeps the manual "Run workflow" button in the UI

jobs:
  mirror-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Force Push Mirror
        run: |
          # Clone the upstream repository cleanly into a temporary folder
          git clone --mirror https://github.com/DTUWindEnergy/OptiWindNet.git upstream-repo
          cd upstream-repo
          
          # Authorize and point to your fork
          git remote set-url --push origin https://x-token-auth:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # Force-push their main branch directly onto your fork's main branch
          git push origin refs/heads/main:refs/heads/main --force
